<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mobile-First Recruitment Platform — Presentation</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f172a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      user-select: none;
    }

    #outer-wrapper {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #slide-scale-wrapper {
      position: absolute;
      transform-origin: top left;
    }

    #slide-frame {
      width: 1280px;
      height: 720px;
      border: none;
      display: block;
      border-radius: 8px;
      box-shadow: 0 25px 80px rgba(0,0,0,0.6);
      background: #f8fafc;
    }

    /* ── Navigation Buttons ── */
    .nav-btn {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      border: 2px solid rgba(255,255,255,0.25);
      color: white;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      z-index: 9999;
      outline: none;
      backdrop-filter: blur(6px);
    }
    .nav-btn:hover {
      background: rgba(255,255,255,0.28);
      border-color: rgba(255,255,255,0.5);
    }
    .nav-btn:active {
      transform: translateY(-50%) scale(0.92);
    }
    .nav-btn:disabled {
      opacity: 0.25;
      cursor: default;
    }

    #prev-btn { left: 16px; }
    #next-btn { right: 16px; }

    /* ── Bottom Bar ── */
    #bottom-bar {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      z-index: 9999;
    }

    #dot-nav {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      cursor: pointer;
      transition: all 0.25s;
      flex-shrink: 0;
    }
    .dot:hover { background: rgba(255,255,255,0.6); }
    .dot.active {
      background: #60a5fa;
      width: 24px;
      border-radius: 4px;
    }

    #slide-counter {
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.05em;
    }

    /* ── Loading overlay ── */
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(15,23,42,0.7);
      z-index: 100;
      border-radius: 8px;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    #loading.hidden { opacity: 0; }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #60a5fa;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }


  </style>
</head>

  <script>
    const TOTAL = 21;
    let current = 0;
    let blobUrls = new Array(TOTAL).fill(null);

    const frame = document.getElementById('slide-frame');
    const counter = document.getElementById('slide-counter');
    const loadingEl = document.getElementById('loading');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const dots = Array.from(document.querySelectorAll('.dot'));
    const scaleWrapper = document.getElementById('slide-scale-wrapper');

    const _titles = ["Mobile-First Recruitment Platform","Problem & Opportunity","Project Overview","Target Users","Core Features — Employers","Core Features — Job Seekers","Tech Stack Overview","High-Level Architecture","User Roles & Security","Database Design","Key Workflows","Sample APIs","Scalability Plan","Cost Optimization Strategy","UX Principles - Mobile First","Out of Scope - Phase 1","Future Enhancements Roadmap","Risks & Challenges","Success Metrics & KPIs","MVP Launch Plan - 4-6 Weeks","Closing & Next Steps"];

    const scrollOverride = `<style>
      html, body { overflow-y: auto !important; height: auto !important; }
      .slide-container { overflow-y: auto !important; overflow-x: hidden !important; height: auto !important; min-height: 720px !important; }
      .slide-content { position: relative !important; top: auto !important; right: auto !important; bottom: auto !important; left: auto !important; height: auto !important; }
    </style>`;

    function getOrCreateBlobUrl(index) {
      if (blobUrls[index]) return blobUrls[index];
      let html = document.getElementById('slide-' + index).value;
      html = html.replace('</head>', scrollOverride + '\n</head>');
      const blob = new Blob([html], { type: 'text/html' });
      blobUrls[index] = URL.createObjectURL(blob);
      return blobUrls[index];
    }

    function preload(index) {
      if (index >= 0 && index < TOTAL) getOrCreateBlobUrl(index);
    }

    function showSlide(index) {
      if (index < 0 || index >= TOTAL) return;
      current = index;

      loadingEl.classList.remove('hidden');
      frame.src = getOrCreateBlobUrl(index);

      // Preload neighbors
      preload(index + 1);
      preload(index - 1);

      counter.textContent = (index + 1) + ' / ' + TOTAL;

      dots.forEach((d, i) => {
        d.classList.toggle('active', i === index);
      });

      prevBtn.disabled = index === 0;
      nextBtn.disabled = index === TOTAL - 1;
    }

    frame.addEventListener('load', () => {
      loadingEl.classList.add('hidden');
    });

    prevBtn.addEventListener('click', () => showSlide(current - 1));
    nextBtn.addEventListener('click', () => showSlide(current + 1));

    dots.forEach(d => {
      d.addEventListener('click', () => showSlide(parseInt(d.dataset.index, 10)));
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') {
        e.preventDefault();
        showSlide(current + 1);
      } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        e.preventDefault();
        showSlide(current - 1);
      } else if (e.key === 'Home') {
        showSlide(0);
      } else if (e.key === 'End') {
        showSlide(TOTAL - 1);
      }
    });

    // Scale the slide to fill the viewport (maintaining 16:9)
    function scaleSlide() {
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const availW = vw - 120; // leave room for nav buttons
      const availH = vh - 100; // leave room for bottom bar
      const scale = Math.min(availW / 1280, availH / 720);

      const scaledW = 1280 * scale;
      const scaledH = 720 * scale;
      const offsetX = Math.max(60, (vw - scaledW) / 2);
      const offsetY = Math.max(10, (vh - scaledH) / 2 - 20);

      scaleWrapper.style.width = '1280px';
      scaleWrapper.style.height = '720px';
      scaleWrapper.style.transform = 'scale(' + scale + ')';
      scaleWrapper.style.left = offsetX + 'px';
      scaleWrapper.style.top = offsetY + 'px';
      scaleWrapper.style.position = 'absolute';
    }

    window.addEventListener('resize', scaleSlide);
    scaleSlide();

    // Initial load
    showSlide(0);
  </script>
