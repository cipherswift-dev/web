<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>A-Z Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f5f5f5;
    }

    #letter {
      font-size: 120px;
      font-weight: bold;
      margin-bottom: 40px;
    }

    .buttons {
      display: flex;
      gap: 20px;
    }

    button {
      padding: 10px 20px;
      font-size: 18px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      background: #007bff;
      color: white;
    }

    button:disabled {
      background: #aaa;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

  <div id="letter">A</div>

  <div class="buttons">
    <button id="prev">Previous</button>
    <button id="next">Next</button>
  </div>

  <script>
    const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
    let index = 0;

    const letterEl = document.getElementById("letter");
    const prevBtn = document.getElementById("prev");
    const nextBtn = document.getElementById("next");

    function updateView() {
      letterEl.textContent = letters[index];
      prevBtn.disabled = index === 0;
      nextBtn.disabled = index === letters.length - 1;
    }

    prevBtn.onclick = () => {
      if (index > 0) index--;
      updateView();
    };

    nextBtn.onclick = () => {
      if (index < letters.length - 1) index++;
      updateView();
    };

    // Swipe / drag support
    let startX = 0;

    document.addEventListener("touchstart", (e) => {
      startX = e.touches[0].clientX;
    });

    document.addEventListener("touchend", (e) => {
      let endX = e.changedTouches[0].clientX;
      handleSwipe(startX, endX);
    });

    document.addEventListener("mousedown", (e) => {
      startX = e.clientX;
    });

    document.addEventListener("mouseup", (e) => {
      let endX = e.clientX;
      handleSwipe(startX, endX);
    });

    function handleSwipe(start, end) {
      const diff = start - end;

      if (diff > 50 && index < letters.length - 1) {
        index++; // swipe left → next
      } else if (diff < -50 && index > 0) {
        index--; // swipe right → prev
      }

      updateView();
    }

    updateView();
  </script>

</body>
</html>
