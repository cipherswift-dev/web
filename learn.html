<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>A-Z Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #f5f5f5;
      transition: background 0.4s ease;
    }

    .spacer {
      height: 10vh;
    }

    #letterContainer {
      height: 80vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #letter {
      font-size: 60vh; /* takes ~80% visually */
      font-weight: bold;
      line-height: 1;
      user-select: none;
      transition: color 0.4s ease;
    }

    .buttons {
      height: 10vh;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
    }

    button {
      padding: 10px 20px;
      font-size: 18px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background: #000;
      color: white;
    }
  </style>
</head>
<body>

  <div class="spacer"></div>

  <div id="letterContainer">
    <div id="letter">A</div>
  </div>

  <div class="buttons">
    <button id="prev">Previous</button>
    <button id="next">Next</button>
  </div>

 <script>
  const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
  let index = 0;

  const letterEl = document.getElementById("letter");

  // Generate LIGHT background color
  function getLightColor() {
    const r = Math.floor(200 + Math.random() * 55);
    const g = Math.floor(200 + Math.random() * 55);
    const b = Math.floor(200 + Math.random() * 55);
    return `rgb(${r}, ${g}, ${b})`;
  }

  // Generate DARK letter color
  function getDarkColor() {
    const r = Math.floor(Math.random() * 100);
    const g = Math.floor(Math.random() * 100);
    const b = Math.floor(Math.random() * 100);
    return `rgb(${r}, ${g}, ${b})`;
  }

  function updateView() {
    letterEl.textContent = letters[index];

    // 🎨 Apply colors
    document.body.style.background = getLightColor();
    letterEl.style.color = getDarkColor();
  }

  document.getElementById("prev").onclick = () => {
    index = (index - 1 + letters.length) % letters.length;
    updateView();
  };

  document.getElementById("next").onclick = () => {
    index = (index + 1) % letters.length;
    updateView();
  };

  // Swipe support
  let startX = 0;

  document.addEventListener("touchstart", (e) => {
    startX = e.touches[0].clientX;
  });

  document.addEventListener("touchend", (e) => {
    handleSwipe(startX, e.changedTouches[0].clientX);
  });

  document.addEventListener("mousedown", (e) => {
    startX = e.clientX;
  });

  document.addEventListener("mouseup", (e) => {
    handleSwipe(startX, e.clientX);
  });

  function handleSwipe(start, end) {
    const diff = start - end;

    if (diff > 50) {
      index = (index + 1) % letters.length;
    } else if (diff < -50) {
      index = (index - 1 + letters.length) % letters.length;
    }

    updateView();
  }

  updateView();
</script>

</body>
</html>
