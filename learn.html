<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>A-Z Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f5f5f5;
    }

    #letter {
      font-size: 60vw; /* 🔥 makes it HUGE and responsive */
      font-weight: bold;
      line-height: 1;
      text-align: center;
      margin-bottom: 30px;
      user-select: none;
    }

    .buttons {
      display: flex;
      gap: 20px;
    }

    button {
      padding: 12px 24px;
      font-size: 18px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background: #007bff;
      color: white;
    }
  </style>
</head>
<body>

  <div id="letter">A</div>

  <div class="buttons">
    <button id="prev">Previous</button>
    <button id="next">Next</button>
  </div>

  <script>
    const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
    let index = 0;

    const letterEl = document.getElementById("letter");

    function updateView() {
      letterEl.textContent = letters[index];
    }

    document.getElementById("prev").onclick = () => {
      index = (index - 1 + letters.length) % letters.length;
      updateView();
    };

    document.getElementById("next").onclick = () => {
      index = (index + 1) % letters.length;
      updateView();
    };

    // Swipe support
    let startX = 0;

    document.addEventListener("touchstart", (e) => {
      startX = e.touches[0].clientX;
    });

    document.addEventListener("touchend", (e) => {
      handleSwipe(startX, e.changedTouches[0].clientX);
    });

    document.addEventListener("mousedown", (e) => {
      startX = e.clientX;
    });

    document.addEventListener("mouseup", (e) => {
      handleSwipe(startX, e.clientX);
    });

    function handleSwipe(start, end) {
      const diff = start - end;

      if (diff > 50) {
        index = (index + 1) % letters.length;
      } else if (diff < -50) {
        index = (index - 1 + letters.length) % letters.length;
      }

      updateView();
    }

    updateView();
  </script>

</body>
</html>
